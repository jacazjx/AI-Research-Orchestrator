<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" />

  <!-- Research icon - magnifying glass with nodes -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Magnifying glass handle -->
    <line x1="130" y1="130" x2="160" y2="160" stroke-width="6" />

    <!-- Magnifying glass circle -->
    <circle cx="110" cy="110" r="35" stroke-width="5" />

    <!-- Research nodes -->
    <circle cx="70" cy="70" r="6" fill="white" stroke="none" />
    <circle cx="110" cy="55" r="5" fill="white" stroke="none" />
    <circle cx="140" cy="85" r="5" fill="white" stroke="none" />
    <circle cx="85" cy="140" r="5" fill="white" stroke="none" />

    <!-- Connection lines -->
    <line x1="75" y1="75" x2="95" y2="85" stroke-width="2" opacity="0.7" />
    <line x1="110" y1="60" x2="105" y2="75" stroke-width="2" opacity="0.7" />
    <line x1="135" y1="85" x2="125" y2="95" stroke-width="2" opacity="0.7" />
    <line x1="90" y1="135" x2="100" y2="125" stroke-width="2" opacity="0.7" />
  </g>

  <!-- Five phases indicator at bottom -->
  <g fill="white" opacity="0.9">
    <rect x="45" y="175" width="20" height="4" rx="2" />
    <rect x="70" y="175" width="20" height="4" rx="2" />
    <rect x="95" y="175" width="20" height="4" rx="2" />
    <rect x="120" y="175" width="20" height="4" rx="2" />
    <rect x="145" y="175" width="10" height="4" rx="2" />
  </g>
</svg>