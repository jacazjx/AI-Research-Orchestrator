<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" />

  <!-- Baton (conductor's baton) - angled diagonally -->
  <g transform="rotate(-35, 100, 100)">
    <!-- Baton handle -->
    <rect x="55" y="45" width="12" height="35" rx="3" fill="#f5f5f5" />
    <rect x="57" y="47" width="3" height="31" rx="1" fill="#e0e0e0" opacity="0.5" />

    <!-- Baton stick -->
    <rect x="57" y="80" width="8" height="85" rx="1" fill="white" />
    <rect x="58" y="82" width="2" height="81" rx="0.5" fill="#f0f0f0" opacity="0.7" />

    <!-- Baton tip highlight -->
    <ellipse cx="61" cy="165" rx="4" ry="2" fill="white" />
  </g>

  <!-- Musical notes floating around (representing orchestrated research phases) -->
  <g fill="white" opacity="0.9">
    <!-- Note 1 - top left -->
    <circle cx="50" cy="60" r="5" />
    <rect x="54" y="35" width="3" height="25" rx="1" />
    <path d="M54 35 Q65 30, 67 40" stroke="white" stroke-width="3" fill="none" />

    <!-- Note 2 - top right -->
    <circle cx="150" cy="55" r="5" />
    <rect x="154" y="30" width="3" height="25" rx="1" />

    <!-- Note 3 - bottom left -->
    <circle cx="45" cy="140" r="4" />
    <rect x="48" y="118" width="2.5" height="22" rx="1" />

    <!-- Note 4 - bottom right -->
    <circle cx="155" cy="145" r="4" />
    <rect x="158" y="123" width="2.5" height="22" rx="1" />
    <circle cx="168" cy="135" r="4" />
    <rect x="171" y="113" width="2.5" height="22" rx="1" />
    <rect x="158" y="113" width="16" height="3" rx="1" />
  </g>

  <!-- Five small dots at bottom representing 5 phases -->
  <g fill="white" opacity="0.95">
    <circle cx="55" cy="170" r="5" />
    <circle cx="77" cy="170" r="5" />
    <circle cx="100" cy="170" r="5" />
    <circle cx="123" cy="170" r="5" />
    <circle cx="145" cy="170" r="5" />
  </g>

  <!-- Subtle connecting line under dots -->
  <line x1="55" y1="170" x2="145" y2="170" stroke="white" stroke-width="1.5" opacity="0.3" />
</svg>